      },
        copied ? Icon('CheckCopy', { width: 14, height: 14 }) : Icon('Copy', { width: 14, height: 14 }),
        copied ? 'Copiado' : 'Copiar'
      );
    }

    function ValidCard(props) {
      var d = props.data;
      return h('article', { className: "fade-up bg-white rounded-2xl shadow-soft-lg border border-emerald-200 overflow-hidden" },
        h('div', { className: "relative bg-gradient-to-r from-emerald-600 to-emerald-500 text-white px-5 sm:px-7 py-5 sm:py-6 flex items-center gap-4" },
          h('div', { className: "relative w-14 h-14 rounded-full bg-white/15 flex items-center justify-center pulse-ring text-white" },
            Icon('Check', { width: 32, height: 32 })
          ),
          h('div', null,
            h('p', { className: "text-[11px] uppercase tracking-widest font-semibold text-emerald-100" }, "Status do documento"),
            h('h3', { className: "text-xl sm:text-2xl font-extrabold leading-tight" }, "Certificado Autêntico")
          ),
          h('span', { className: "ml-auto hidden sm:inline-flex items-center gap-1.5 text-xs font-semibold bg-white/20 px-3 py-1.5 rounded-full" },
            Icon('Lock', { width: 14, height: 14 }), "Verificado"
          )
        ),
        h('div', { className: "px-5 sm:px-7 py-4" },
          h('div', { className: "grid grid-cols-1 sm:grid-cols-2 gap-x-8" },
            h('div', null,
              h(MetaRow, { icon: 'User',     label: "Aluno",            value: d.aluno }),
              h(MetaRow, { icon: 'Book',     label: "Curso / Evento",   value: d.curso }),
              h(MetaRow, { icon: 'Building', label: "Instituição",      value: d.instituicao })
            ),
            h('div', null,
              h(MetaRow, { icon: 'Calendar', label: "Data de Emissão",  value: d.dataEmissao }),
              h(MetaRow, { icon: 'Clock',    label: "Carga Horária",    value: d.cargaHoraria }),
              h(MetaRow, { icon: 'Shield',   label: "ID do Registro",   value: d.id, mono: true })
            )
          ),
          h('div', { className: "mt-4 rounded-xl bg-slate-50 border border-slate-200 px-4 py-3 flex flex-col sm:flex-row sm:items-center gap-3 justify-between" },
            h('div', { className: "min-w-0" },
              h('p', { className: "text-[11px] uppercase tracking-wider font-semibold text-slate-500" }, "Link validado"),
              h('p', { className: "font-mono text-xs sm:text-sm text-slate-700 truncate" }, d.link)
            ),
            h(CopyButton, { text: d.link })
          )
        )
      );
    }

    function InvalidCard(props) {
      return h('article', { className: "fade-up bg-white rounded-2xl shadow-soft-lg border border-rose-200 overflow-hidden" },
        h('div', { className: "relative bg-gradient-to-r from-rose-600 to-rose-500 text-white px-5 sm:px-7 py-5 sm:py-6 flex items-center gap-4" },
          h('div', { className: "w-14 h-14 rounded-full bg-white/15 flex items-center justify-center" },
            Icon('X', { width: 32, height: 32 })
          ),
          h('div', null,
            h('p', { className: "text-[11px] uppercase tracking-widest font-semibold text-rose-100" }, "Status do documento"),
            h('h3', { className: "text-xl sm:text-2xl font-extrabold leading-tight" }, "Certificado não encontrado")
          )
        ),
        h('div', { className: "px-5 sm:px-7 py-6" },
          h('p', { className: "text-slate-700" },
            "O link informado ",
            h('span', { className: "font-semibold" }, "não consta em nossos registros"),
            ". Isso pode significar que o certificado é inválido, foi adulterado ou ainda não foi cadastrado em nossa base de dados."
          ),
          props.searchedLink ? h('div', { className: "mt-4 rounded-xl bg-rose-50 border border-rose-200 px-4 py-3" },
            h('p', { className: "text-[11px] uppercase tracking-wider font-semibold text-rose-700" }, "Link pesquisado"),
            h('p', { className: "font-mono text-xs sm:text-sm text-rose-900 break-all" }, props.searchedLink)
          ) : null,
          h('div', { className: "mt-5 grid sm:grid-cols-3 gap-3 text-sm" },
            h('div', { className: "flex items-start gap-2 text-slate-600" },
              Icon('Alert', { width: 16, height: 16, style: { color: '#f43f5e', marginTop: 2 } }),
              h('span', null, "Confira se copiou o link completo.")
            ),
            h('div', { className: "flex items-start gap-2 text-slate-600" },
              Icon('Alert', { width: 16, height: 16, style: { color: '#f43f5e', marginTop: 2 } }),
              h('span', null, "Verifique com a instituição emissora.")
            ),
            h('div', { className: "flex items-start gap-2 text-slate-600" },
              Icon('Alert', { width: 16, height: 16, style: { color: '#f43f5e', marginTop: 2 } }),
              h('span', null, "Desconfie de documentos falsificados.")
            )
          ),
          h('div', { className: "mt-6 flex flex-wrap gap-3" },
            h('button', {
              onClick: props.onRetry,
              className: "inline-flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-white bg-brand-500 hover:bg-brand-700 transition"
            },
              Icon('Search', { width: 16, height: 16 }),
              "Tentar novamente"
            )
          )
        )
      );
    }

    function Stats() {
      var instCount = useMemo(function () {
        var s = {};
        for (var i = 0; i < certificados.length; i++) s[certificados[i].instituicao] = 1;
        return Object.keys(s).length;
      }, []);
      var cursoCount = useMemo(function () {
        var s = {};
        for (var i = 0; i < certificados.length; i++) s[certificados[i].curso] = 1;
        return Object.keys(s).length;
      }, []);
      var totalHoras = useMemo(function () {
        var t = 0;
        for (var i = 0; i < certificados.length; i++) {
          var n = parseInt(certificados[i].cargaHoraria, 10);
          if (!isNaN(n)) t += n;
        }
        return t.toLocaleString('pt-BR') + 'h';
      }, []);

      var items = [
        { label: "Registros",            value: certificados.length },
        { label: "Instituições",         value: instCount },
        { label: "Cursos validados",     value: cursoCount },
        { label: "Carga horária total",  value: totalHoras }
      ];
      return h('section', { className: "max-w-5xl mx-auto px-4 sm:px-6 mt-10 sm:mt-14" },
        h('div', { className: "grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4" },
          items.map(function (it) {
            return h('div', { key: it.label, className: "bg-white/80 backdrop-blur border border-slate-200 rounded-xl px-4 py-3 sm:py-4 text-center" },
              h('p', { className: "text-xl sm:text-2xl font-extrabold text-brand-500" }, it.value),
              h('p', { className: "text-[11px] sm:text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1" }, it.label)
            );
          })
        )
      );
    }

    function HowItWorks() {
      var steps = [
        { n: 1, t: "Receba o link",   d: "A instituição emissora envia um link único de validação junto ao certificado." },
        { n: 2, t: "Cole e verifique", d: "Insira o link no campo acima e clique em 'Verificar Certificado'." },
        { n: 3, t: "Consulte o registro", d: "Veja os dados oficiais do aluno, curso, carga horária e data de emissão." }
      ];
      return h('section', { className: "max-w-5xl mx-auto px-4 sm:px-6 mt-10 sm:mt-14" },
        h('h3', { className: "text-center text-lg sm:text-xl font-bold text-slate-900" }, "Como funciona"),
        h('p', { className: "text-center text-slate-500 text-sm mt-1" }, "Em três passos simples"),
        h('div', { className: "mt-6 grid sm:grid-cols-3 gap-4" },
          steps.map(function (s) {
            return h('div', { key: s.n, className: "bg-white rounded-2xl border border-slate-200 p-5 shadow-soft" },
              h('div', { className: "w-9 h-9 rounded-lg bg-brand-100 text-brand-500 font-bold flex items-center justify-center" }, s.n),
              h('h4', { className: "mt-3 font-semibold text-slate-900" }, s.t),
              h('p', { className: "text-sm text-slate-600 mt-1" }, s.d)
            );
          })
        )
      );
    }

    function Footer() {
      var year = new Date().getFullYear();
      return h('footer', { className: "mt-14 sm:mt-20 border-t border-slate-200/70 bg-white/60 backdrop-blur" },
        h('div', { className: "max-w-6xl mx-auto px-4 sm:px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-slate-500" },
          h('p', null, "© " + year + " Plataforma de Validação Acadêmica — Todos os direitos reservados."),
          h('p', { className: "flex items-center gap-1.5" },
            Icon('Lock', { width: 14, height: 14 }),
            "Sistema protegido por criptografia"
          )
        )
      );
    }

    function App() {
      var _loading = useState(false);
      var loading = _loading[0], setLoading = _loading[1];
      var _result = useState(null);
      var result = _result[0], setResult = _result[1];
      var resultRef = useRef(null);

      function handleVerify(link) {
        setLoading(true);
        setResult(null);
        setTimeout(function () {
          var normalized = (link || '').trim().toLowerCase();
          var found = null;
          for (var i = 0; i < certificados.length; i++) {
            if (certificados[i].link.toLowerCase() === normalized) { found = certificados[i]; break; }
          }
          if (found) setResult({ status: 'valid', data: found, searchedLink: link.trim() });
          else       setResult({ status: 'invalid', searchedLink: link.trim() });
          setLoading(false);
          setTimeout(function () {
            if (resultRef.current) resultRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 80);
        }, 700);
      }

      function handleReset() {
        setResult(null);
        setTimeout(function () {
          var i = document.getElementById('link');
          if (i) i.focus();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 50);
      }

      return h(React.Fragment, null,
        h(Header, null),
        h('main', { className: "flex-1" },
          h(Hero, null),
          h(VerifyForm, { onVerify: handleVerify, loading: loading }),
          h('div', { ref: resultRef, className: "max-w-3xl mx-auto px-4 sm:px-6 mt-6" },
            result && result.status === 'valid'   ? h(ValidCard,   { data: result.data }) : null,
            result && result.status === 'invalid' ? h(InvalidCard, { searchedLink: result.searchedLink, onRetry: handleReset }) : null
          ),
          h(Stats, null),
          h(HowItWorks, null)
        ),
        h(Footer, null)
      );
    }

    // Limpa o fallback e monta a app
    var rootEl = document.getElementById('root');
    if (rootEl) rootEl.innerHTML = '';
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App, null));
  })();
  </script>
</body>
</html>
